    .blog-grid {

    }
    .blog-card {
      background: #fff;
      border-radius: 10px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    .blog-card h3 {
      margin-bottom: 10px;
    }
    .blog-card p {
      font-size: 0.95rem;
      color: #444;
    }
    .blog-card a {
      display: inline-block;
      margin-top: 10px;
      font-size: 0.9rem;
      color: #0066cc;
      text-decoration: none;
    }
